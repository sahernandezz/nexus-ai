# ??? Gradle JVM ??????????????????????????????????????????????????????????????
# Kotlin 2.0 bundled with Gradle 8.x cannot parse Java 25 version strings.
# Force the Gradle daemon to run on Java 21 (Corretto LTS).
# The compiled bytecode still uses the Java 25 toolchain defined in build.gradle.kts.
#
# Docker: the Dockerfile copies build files first, then strips this line with
#   sed -i '/org.gradle.java.home/d' gradle.properties
# before invoking Gradle (see Dockerfile Stage 1).
#
# Local override: update the path below to match your Java 21 installation.
org.gradle.java.home=/Users/sergio/Library/Java/JavaVirtualMachines/corretto-21.0.9/Contents/Home

# ??? Performance ?????????????????????????????????????????????????????????????
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# ??? Kotlin DSL ??????????????????????????????????????????????????????????????
kotlin.code.style=official
