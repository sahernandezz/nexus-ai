global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: nexusai

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nexusai-backend"
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "nexusai-backend"

  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    scrape_interval: 30s
    static_configs:
      - targets: ["minio:9000"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
