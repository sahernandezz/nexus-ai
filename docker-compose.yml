services:

  # ─── PostgreSQL 16 with pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexusai-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-nexusai}
      POSTGRES_USER: ${DB_USER:-nexusai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexusai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexusai} -d ${DB_NAME:-nexusai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          exec redis-server --requirepass \"$$REDIS_PASSWORD\"
        else
          exec redis-server
        fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── RabbitMQ 3 with Management UI ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexusai-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── MinIO (Object Storage) ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nexusai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexusai-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexusai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── Jaeger (All-in-one) ──────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexusai-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"    # Jaeger UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── Spring Boot Backend ──────────────────────────────────────────────────────
  app:
    build:
      context: ./nexusai-backend
      dockerfile: Dockerfile
    container_name: nexusai-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexusai}
      DB_USER: ${DB_USER:-nexusai}
      DB_PASSWORD: ${DB_PASSWORD:-nexusai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      JWT_SECRET: ${JWT_SECRET:-nexusai-super-secret-key-change-in-production-minimum-32-chars}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      # LM Studio on host machine (Mac/Windows use host.docker.internal, Linux uses host.containers.internal or 172.17.0.1)
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: nexusai-documents
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - nexusai-net
    restart: unless-stopped

  # ─── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./nexusai-frontend
      dockerfile: Dockerfile
    container_name: nexusai-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nexusai-net
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  nexusai-net:
    driver: bridge

