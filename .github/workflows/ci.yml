name: CI — Build · Test · Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/nexusai-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nexusai-frontend

jobs:
  # ─── Backend: unit tests ────────────────────────────────────────────────────
  backend-unit-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('nexusai-backend/**/*.gradle*', 'nexusai-backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run unit tests
        working-directory: nexusai-backend
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: nexusai-backend/build/reports/tests/test/

  # ─── Backend: integration tests (Testcontainers) ────────────────────────────
  backend-integration-tests:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('nexusai-backend/**/*.gradle*', 'nexusai-backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run integration tests
        working-directory: nexusai-backend
        run: ./gradlew integrationTest --no-daemon
        env:
          OPENAI_API_KEY: sk-test-placeholder

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: nexusai-backend/build/reports/tests/integrationTest/

  # ─── Frontend: type-check + build ───────────────────────────────────────────
  frontend-build:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nexusai-frontend/package-lock.json

      - name: Install dependencies
        working-directory: nexusai-frontend
        run: npm ci

      - name: Type check
        working-directory: nexusai-frontend
        run: npm run type-check

      - name: Build
        working-directory: nexusai-frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: nexusai-frontend/dist/
          retention-days: 3

  # ─── Docker: build and push images (only on main) ───────────────────────────
  docker-push:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-integration-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ─────────────────────────────────────────────────────
      - name: Extract backend metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./nexusai-backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ────────────────────────────────────────────────────
      - name: Extract frontend metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./nexusai-frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          build-args: VITE_API_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

